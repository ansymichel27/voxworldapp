<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - VoxWorld</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:#1e293b;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#22c55e;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

a{
color:#38bdf8;
font-size:14px;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Connexion</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Mot de passe">

<button>Se connecter</button>

<p>Pas encore de compte ?</p>

<a href="signup.html">Créer un profil</a>

</div>

</body>
</html>
