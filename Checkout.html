<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoxWorldApp Checkout</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
      padding: 40px;
      text-align: center;
    }
    .box {
      max-width: 520px;
      margin: auto;
      background: rgba(255,255,255,0.06);
      padding: 24px;
      border-radius: 18px;
    }
    input, button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }
    button {
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(90deg,#7fffd4,#53a8ff);
      color: #041224;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Buy Voice Service</h1>

    <input id="artistAccountId" placeholder="Artist Stripe Account ID" />
    <input id="institutionAccountId" placeholder="Institution Stripe Account ID" />
    <input id="amount" type="number" placeholder="Amount in USD" />

    <button id="checkoutBtn">Pay Now</button>
  </div>

  <script>
    const stripe = Stripe("pk_test_YOUR_PUBLISHABLE_KEY");

    document.getElementById("checkoutBtn").addEventListener("click", async () => {
      const artistAccountId = document.getElementById("artistAccountId").value.trim();
      const institutionAccountId = document.getElementById("institutionAccountId").value.trim();
      const amount = document.getElementById("amount").value.trim();

      const res = await fetch("/create-checkout-session", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          artistAccountId,
          institutionAccountId,
          amount
        })
      });

      const data = await res.json();

      if (!data.id) {
        alert(data.error || "Unable to create checkout session.");
        return;
      }

      const result = await stripe.redirectToCheckout({ sessionId: data.id });

      if (result.error) {
        alert(result.error.message);
      }
    });
  </script>
</body>
</html>
