<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoxWorldApp</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0f1a;
  color:white;
}
header{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:#111;
}
nav a{
  margin:0 10px;
  color:white;
  text-decoration:none;
  cursor:pointer;
}
button{
  cursor:pointer;
  padding:10px 15px;
  border:none;
  border-radius:8px;
}
.hero{
  text-align:center;
  padding:80px 20px;
}
.section{
  padding:60px 20px;
  text-align:center;
}
.cta{
  background:#1c1f2e;
}
.lang-btn.active{
  background:#3ec5ff;
  color:black;
}
.chatbox{
  position:fixed;
  bottom:20px;
  right:20px;
  width:300px;
  background:#1c1f2e;
  border-radius:10px;
  display:none;
  flex-direction:column;
}
.chatbox.open{
  display:flex;
}
.chat-header{
  padding:10px;
  background:#333;
}
.chat-messages{
  height:200px;
  overflow:auto;
  padding:10px;
}
.chat-input{
  display:flex;
}
.chat-input input{
  flex:1;
  padding:10px;
}
</style>
</head>

<body>

<header>
  <div><b>VoxWorld</b></div>
  <nav>
    <a href="#features">Features</a>
    <a href="#how">How</a>
    <a href="#contact">Contact</a>
    <button onclick="goSignup()">Join Now</button>
  </nav>
  <div>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" onclick="setLang('es')">ES</button>
  </div>
</header>

<section class="hero">
  <h1 id="title">Build your voice identity</h1>
  <p id="desc">Connect globally and earn</p>
  <button onclick="goSignup()">Start Your Profile</button>
</section>

<section id="features" class="section">
  <h2>Features</h2>
  <p>Upload voice, collaborate, earn money</p>
</section>

<section id="how" class="section">
  <h2>How it works</h2>
  <p>Create profile → Upload → Earn</p>
</section>

<section id="contact" class="section">
  <h2>Contact</h2>
  <p>Email: iit-llco@outlook.com</p>
</section>

<section class="section cta">
  <h2>Ready?</h2>
  <button onclick="goSignup()">Go to Sign Up</button>
</section>

<button onclick="toggleChat()" style="position:fixed;bottom:20px;left:20px;">Chat</button>

<div id="chatbox" class="chatbox">
  <div class="chat-header">
    Assistant
    <button onclick="toggleChat()">X</button>
  </div>
  <div id="messages" class="chat-messages"></div>
  <div class="chat-input">
    <input id="input" placeholder="Ask..." />
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
function goSignup(){
  window.location.href="signup.html";
}

document.querySelectorAll('a[href^="#"]').forEach(a=>{
  a.onclick=e=>{
    e.preventDefault();
    document.querySelector(a.getAttribute("href"))
      .scrollIntoView({behavior:"smooth"});
  }
});

const langData={
  en:{title:"Build your voice identity",desc:"Connect globally and earn"},
  fr:{title:"Construisez votre identité vocale",desc:"Connectez-vous et gagnez"},
  es:{title:"Construye tu identidad vocal",desc:"Conéctate y gana dinero"}
};

function setLang(l){
  document.getElementById("title").innerText=langData[l].title;
  document.getElementById("desc").innerText=langData[l].desc;

  document.querySelectorAll(".lang-btn").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

function toggleChat(){
  document.getElementById("chatbox").classList.toggle("open");
}

function sendMsg(){
  const input=document.getElementById("input");
  const msg=input.value;
  if(!msg) return;

  addMsg(msg,"user");

  setTimeout(()=>{
    addMsg("AI: Welcome to VoxWorld", "ai");
  },500);

  input.value="";
}

function addMsg(text,type){
  const div=document.createElement("div");
  div.innerText=text;
  div.style.margin="5px 0";
  document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
