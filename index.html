<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOX WORLD AI</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg:#000;
  --panel:#121212;
  --accent:#ffd700;
  --green:#1db954;
  --text:#fff;
  --muted:#b3b3b3;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.sidebar {
  width:260px;
  background:#111;
  height:100vh;
  position:fixed;
  padding:20px;
}

.sidebar h2 {
  color:var(--accent);
}

.sidebar button {
  width:100%;
  margin:10px 0;
  padding:12px;
  background:#222;
  border:none;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
}

.main {
  margin-left:260px;
  padding:20px;
}

.hero {
  background:linear-gradient(135deg,#1db954,#000);
  padding:30px;
  border-radius:20px;
}

input,textarea {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin:10px 0;
}

button.mainbtn {
  background:var(--accent);
  border:none;
  padding:12px 20px;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
}

.card {
  background:#181818;
  padding:20px;
  border-radius:15px;
  margin:10px 0;
}

.gallery img {
  width:100%;
  border-radius:15px;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>VOX AI</h2>
  <button onclick="show('home')">Home</button>
  <button onclick="show('ai')">AI Ask</button>
  <button onclick="show('gallery')">Gallery</button>
  <button onclick="show('login')">Artist ID</button>
</div>

<div class="main">

<div id="home">
  <div class="hero">
    <h1>VOX WORLD AI</h1>
    <p>A modern creative AI platform with artist tools, multilingual control, favorites, and gallery management.</p>
  </div>

  <div class="card">
    <h3>Modern Design</h3>
    <p>Premium dark interface with smooth navigation.</p>
  </div>

  <div class="card">
    <h3>AI Tools</h3>
    <p>Create, search, and manage your ideas instantly.</p>
  </div>

</div>

<div id="ai" style="display:none">
  <h2>AI Assistant</h2>
  <textarea id="msg"></textarea>
  <button class="mainbtn" onclick="send()">Send</button>

  <div id="chat"></div>
</div>

<div id="gallery" style="display:none">
  <h2>Gallery</h2>
  <input id="imgurl" placeholder="Image URL">
  <button class="mainbtn" onclick="upload()">Upload</button>
  <div id="gal"></div>
</div>

<div id="login" style="display:none">
  <h2>Artist ID</h2>
  <input id="email" placeholder="email">
  <input id="pass" placeholder="password">
  <button class="mainbtn" onclick="login()">Login</button>
</div>

</div>

<script>
const SUPABASE_URL="https://gcomuxxidbjgqmdqsnfq.supabase.co";
const SUPABASE_ANON_KEY="PUT_YOUR_KEY";

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

function show(p){
  ["home","ai","gallery","login"].forEach(x=>{
    document.getElementById(x).style.display="none"
  })
  document.getElementById(p).style.display="block"
}

function send(){
  let t=document.getElementById("msg").value
  document.getElementById("chat").innerHTML+=`<div class="card">${t}</div>`
  document.getElementById("chat").innerHTML+=`<div class="card">AI: I understand. Build this idea.</div>`
}

async function upload(){
  let url=document.getElementById("imgurl").value
  await sb.from("gallery").insert([{url}])
  loadGallery()
}

async function loadGallery(){
  let {data}=await sb.from("gallery").select("*")
  let html=""
  data.forEach(i=>{
    html+=`<div class="card gallery"><img src="${i.url}"></div>`
  })
  document.getElementById("gal").innerHTML=html
}

async function login(){
  let email=document.getElementById("email").value
  let pass=document.getElementById("pass").value
  await sb.auth.signInWithPassword({email,password:pass})
  alert("Logged in")
}

loadGallery()
</script>

</body>
</html>
