<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOX WORLD AI</title>

<!-- STYLE -->
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #2c003e, #000);
  color: white;
}

header {
  background: #3d0066;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  color: gold;
  font-weight: bold;
}

nav {
  display: flex;
  justify-content: center;
  gap: 15px;
  padding: 10px;
}

button {
  background: gold;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
  border-radius: 8px;
  font-weight: bold;
}

section {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
}
</style>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<header>VOX WORLD AI ✨</header>

<nav>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('ai')">AI Ask</button>
  <button onclick="showPage('gallery')">Gallery</button>
  <button onclick="showPage('login')">Artist ID</button>
</nav>

<!-- HOME -->
<section id="home" class="active">
  <h2>Welcome</h2>
  <p>Your AI + Creative Platform</p>
</section>

<!-- AI -->
<section id="ai">
  <h2>Ask AI</h2>
  <textarea id="userInput" placeholder="Ask something..."></textarea>
  <button onclick="sendMessage()">Send</button>

  <div id="chatBox"></div>
</section>

<!-- GALLERY -->
<section id="gallery">
  <h2>Gallery</h2>

  <input type="text" id="imageUrl" placeholder="Paste image URL">
  <button onclick="uploadImage()">Upload</button>

  <div id="galleryList"></div>
</section>

<!-- LOGIN -->
<section id="login">
  <h2>Artist ID Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="signUp()">Sign Up</button>
  <button onclick="signIn()">Login</button>

  <p id="userStatus"></p>
</section>

<script>
// =============================
// 🔥 SUPABASE CONFIG (PUT YOUR REAL KEYS)
// =============================
const SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_PUBLIC_ANON_KEY";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

// =============================
// NAVIGATION
// =============================
function showPage(page) {
  document.querySelectorAll("section").forEach(sec => {
    sec.classList.remove("active");
  });
  document.getElementById(page).classList.add("active");
}

// =============================
// AI CHAT (SIMPLE SAVE)
// =============================
async function sendMessage() {
  const input = document.getElementById("userInput").value;

  if (!input) return;

  // DISPLAY
  const chatBox = document.getElementById("chatBox");
  chatBox.innerHTML += `<div class="card">You: ${input}</div>`;

  // SAVE TO SUPABASE
  const { error } = await supabase
    .from("messages")
    .insert([{ text: input }]);

  if (error) {
    console.error(error);
  }

  document.getElementById("userInput").value = "";
}

// =============================
// GALLERY
// =============================
async function uploadImage() {
  const url = document.getElementById("imageUrl").value;

  if (!url) return;

  await supabase.from("gallery").insert([{ url }]);

  loadGallery();
}

async function loadGallery() {
  const { data } = await supabase.from("gallery").select("*");

  const container = document.getElementById("galleryList");
  container.innerHTML = "";

  data.forEach(img => {
    container.innerHTML += `
      <div class="card">
        <img src="${img.url}" width="100%">
      </div>
    `;
  });
}

loadGallery();

// =============================
// AUTH (Artist ID)
// =============================
async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Account created!");
  }
}

async function signIn() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    document.getElementById("userStatus").innerText =
      "Logged in as: " + data.user.email;
  }
}

</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "PASTE_YOUR_URL_HERE";
const SUPABASE_KEY = "PASTE_YOUR_ANON_KEY_HERE";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// SIGN UP
async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signUp({
    email,
    password,
  });

  if (error) alert(error.message);
  else alert("Account created!");
}

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password,
  });

  if (error) alert(error.message);
  else alert("Logged in!");
}

// SAVE DATA
async function saveUser(email) {
  const { data, error } = await supabaseClient
    .from("users")
    .insert([{ email: email }]);

  if (error) console.log(error);
  else console.log("Saved!");
}
</script></body>
</html>
