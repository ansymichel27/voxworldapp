<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoxWorld App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: white;
}

header {
    background: #111;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    color: gold;
}

nav {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    background: #1a1a1a;
}

button {
    padding: 10px 15px;
    border: none;
    background: purple;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: gold;
    color: black;
}

.section {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

.card {
    background: #1c1c1c;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

img {
    max-width: 100%;
    border-radius: 10px;
}

audio, video {
    width: 100%;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>VOXWORLD APP</header>

<nav>
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('profile')">Profile</button>
    <button onclick="showSection('gallery')">Gallery</button>
    <button onclick="showSection('music')">Music</button>
    <button onclick="showSection('video')">Video</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">
    <div class="card">
        <h2>Welcome</h2>
        <p>Upload your content and explore artists.</p>
    </div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
    <div class="card">
        <h2>Artist Profile</h2>
        <img src="https://via.placeholder.com/300" alt="Profile">
        <p>Name: Ansy777</p>
        <p>Style: Kompa Futuristic</p>
    </div>
</div>

<!-- GALLERY -->
<div id="gallery" class="section">
    <div class="card">
        <h2>Gallery</h2>
        <input type="file" id="imageUpload">
        <div id="imageContainer"></div>
    </div>
</div>

<!-- MUSIC -->
<div id="music" class="section">
    <div class="card">
        <h2>Upload Music</h2>
        <input type="file" id="audioUpload" accept="audio/*">
        <div id="audioContainer"></div>
    </div>
</div>

<!-- VIDEO -->
<div id="video" class="section">
    <div class="card">
        <h2>Upload Video</h2>
        <input type="file" id="videoUpload" accept="video/*">
        <div id="videoContainer"></div>
    </div>
</div>

<script>
function showSection(sectionId) {
    let sections = document.querySelectorAll('.section');
    sections.forEach(sec => sec.classList.remove('active'));

    document.getElementById(sectionId).classList.add('active');
}

// IMAGE UPLOAD
document.getElementById("imageUpload").addEventListener("change", function(event) {
    let container = document.getElementById("imageContainer");
    container.innerHTML = "";

    let file = event.target.files[0];
    if (file) {
        let img = document.createElement("img");
        img.src = URL.createObjectURL(file);
        container.appendChild(img);
    }
});

// AUDIO UPLOAD
document.getElementById("audioUpload").addEventListener("change", function(event) {
    let container = document.getElementById("audioContainer");
    container.innerHTML = "";

    let file = event.target.files[0];
    if (file) {
        let audio = document.createElement("audio");
        audio.controls = true;
        audio.src = URL.createObjectURL(file);
        container.appendChild(audio);
    }
});

// VIDEO UPLOAD
document.getElementById("videoUpload").addEventListener("change", function(event) {
    let container = document.getElementById("videoContainer");
    container.innerHTML = "";

    let file = event.target.files[0];
    if (file) {
        let video = document.createElement("video");
        video.controls = true;
        video.src = URL.createObjectURL(file);
        container.appendChild(video);
    }
});
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://gcomuxxidbjgqmdqsnfq.supabase.co";
const SUPABASE_KEY = "sb_publishable_q2fKaWabHc1ldmmlipQuoA_qwyp3XR-";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// UPLOAD FUNCTION
async function uploadFile(file, type) {
    const fileName = Date.now() + "_" + file.name;

    const { error } = await supabase.storage
        .from('media')
        .upload(fileName, file);

    if (error) {
        alert("Upload failed: " + error.message);
        return;
    }

    const fileUrl = `${SUPABASE_URL}/storage/v1/object/public/media/${fileName}`;

    await supabase.from('posts').insert([
        { type: type, file_url: fileUrl }
    ]);

    loadPosts();
}

// LOAD POSTS
async function loadPosts() {
    const { data, error } = await supabase
        .from('posts')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) return;

    document.getElementById("imageContainer").innerHTML = "";
    document.getElementById("audioContainer").innerHTML = "";
    document.getElementById("videoContainer").innerHTML = "";

    data.forEach(post => {
        if (post.type === "image") {
            let img = document.createElement("img");
            img.src = post.file_url;
            document.getElementById("imageContainer").appendChild(img);
        }

        if (post.type === "audio") {
            let audio = document.createElement("audio");
            audio.controls = true;
            audio.src = post.file_url;
            document.getElementById("audioContainer").appendChild(audio);
        }

        if (post.type === "video") {
            let video = document.createElement("video");
            video.controls = true;
            video.src = post.file_url;
            document.getElementById("videoContainer").appendChild(video);
        }
    });
}

// EVENTS
document.getElementById("imageUpload").addEventListener("change", e => {
    uploadFile(e.target.files[0], "image");
});

document.getElementById("audioUpload").addEventListener("change", e => {
    uploadFile(e.target.files[0], "audio");
});

document.getElementById("videoUpload").addEventListener("change", e => {
    uploadFile(e.target.files[0], "video");
});

// LOAD ON START
loadPosts();
</script>

</body>
</html>
